            {
                id: "P2_Q1",

                section: "B",
                subtopic: "Rowing Analysis",
                level: "HL",
                title: "Question 1 — Rowing",
                context: "Consider the following information about rowing. The rower sits on a moveable seat and holds the oar with two hands. The oar extends out to the side and passes through a metal hoop called an oarlock. The rower moves backwards and forwards, completing a 4-phase action which moves the blade through the water and then back to the catch position.<div class=\"fig-placeholder\"><i class=\"ph-bold ph-image\"></i>[Placeholder: Figure 1 - Fact file about rowing]</div><div class=\"fig-placeholder\"><i class=\"ph-bold ph-image\"></i>[Placeholder: Figure 2 - The catch, drive and finish phases]</div>",
                parts: [
                    {
                        label: "(a)(i)",
                        question: "Identify the type of lever.",
                        marks: 1,
                        answer: "✓ first class &lt;lever&gt;;<br><i>Accept \"second class lever\" as the end of the blade can act as fulcrum.</i>",
                        studentExplanation: {
                            title: "Lever Systems",
                            icon: "📚",
                            content: "In a <b>first-class lever</b>, the fulcrum sits <i>between</i> the effort and the load — like a seesaw. In the rowing oar, the <b>oarlock (fulcrum)</b> sits between the rower's hands (effort) and the blade (load). A <b>second-class lever</b> is also accepted because if you treat the <i>end of the blade</i> where it meets the water as the fixed point (fulcrum), the load (boat/oarlock resistance) sits between it and the effort (hands) — making it second class. Both interpretations are biomechanically valid depending on where you define the fulcrum.<br><br>📖 <b>Course Companion, pp. 300–303 (Chapter B.1.4)</b>"
                        }
                    },
                    {
                        label: "(a)(ii)",
                        question: "Identify the fulcrum and the load on the oar.",
                        marks: 2,
                        answer: "Fulcrum: ✓ oarlock/gate;<br>Load: ✓ blade/cleaver;<br><i>Accept \"end of the blade\" for the fulcrum if \"second class lever\" given in (i).</i>",
                        studentExplanation: {
                            title: "Lever Components",
                            icon: "📚",
                            content: "The <b>three components of any lever</b> are the fulcrum (pivot point), the effort (applied force), and the load (resistance to be overcome). In the rowing oar:<br><br><b>Effort</b> = the rower's hands pulling the handle<br><b>Fulcrum</b> = the oarlock (the metal hoop through which the oar pivots)<br><b>Load</b> = the blade pushing against the water<br><br>This is consistent regardless of whether you classify it as first or second class. Note: the <i>load</i> is the resistance the blade faces from the water, not the boat itself.<br><br>📖 <b>Course Companion, pp. 300–303 (Chapter B.1.4)</b>"
                        }
                    },
                    {
                        label: "(a)(iii)",
                        question: "Describe how the oar creates a mechanical advantage to accelerate the boat effectively.",
                        marks: 2,
                        answer: "✓ smaller distance between handle and fulcrum/oarlock OR longer distance between fulcrum/oarlock and blade;<br>✓ force applied &lt;to the water&gt; over longer distance/from the catch to the finish &lt;compared to distance moved by handle&gt;;",
                        studentExplanation: {
                            title: "Mechanical Advantage",
                            icon: "📚",
                            content: "<b>Mechanical advantage (MA) = effort arm ÷ load arm.</b> Because the blade end of the oar is <i>much longer</i> from the oarlock than the handle end, the blade travels through a large arc in the water even when the hands move only a small distance. This means the blade applies force over a greater distance, driving more water backward and propelling the boat forward with greater effectiveness. Although the MA here is actually less than 1 (meaning more effort is needed), the <i>speed and range of motion</i> at the blade end are amplified — this is the key biomechanical trade-off in rowing.<br><br>📖 <b>Course Companion, pp. 300–305 (Chapter B.1.4)</b>"
                        }
                    },
                    {
                        label: "(b)",
                        question: "<div class=\"fig-placeholder\"><i class=\"ph-bold ph-image\"></i>[Placeholder: Figure 3 - The velocity of the boat at different stages of the stroke]</div>Explain why the velocity decreases then increases after the blade enters water.",
                        marks: 3,
                        answer: "<b>Decrease:</b> ✓ &lt;blade entering water&gt; creates drag &lt;which decelerates the boat&gt;;<br>✓ resulting forces acting against direction of travel;<br><b>Increase:</b> ✓ effort force overcomes drag/forces against direction of travel &lt;to cause the velocity to rise&gt;;",
                        studentExplanation: {
                            title: "Fluid Mechanics & Forces",
                            icon: "📚",
                            content: "<b>Drag</b> is a resistive force that opposes motion through a fluid (water or air). When the blade enters the water at the catch, the sudden increase in drag briefly slows the boat — the drag force exceeds the propulsive force. As the drive phase progresses and the rower applies maximum force, the <i>effort force overcomes drag</i>, and net force acts in the direction of travel, accelerating the boat again. This explains the characteristic velocity dip seen in the graph at the catch position.<br><br>📖 <b>Course Companion, pp. 308–315 (Chapter B.2.1 — Newton's Laws & Forces)</b>"
                        }
                    },
                    {
                        label: "(c)",
                        question: "<div class=\"fig-placeholder\"><i class=\"ph-bold ph-image\"></i>[Placeholder: Figure 4 - An indoor rowing training water tank]</div>Evaluate the use of indoor water tanks for testing new blade designs.",
                        marks: 2,
                        answer: "<b>Strengths [1 max]:</b> ✓ control variables; ✓ manipulate variables; ✓ opportunity to collect more data;<br><b>Limitations [1 max]:</b> ✓ difficult to replicate natural conditions; ✓ outside conditions vary over the course; ✓ &lt;building/maintenance&gt; cost;",
                        studentExplanation: {
                            title: "Evaluating Experimental Design",
                            icon: "📚",
                            content: "This is a <b>Nature of Science (NOS)</b> question about experimental design. Indoor tanks allow scientists to isolate specific variables (e.g., water speed, blade angle) without interference from wind, currents, or waves — this improves <i>internal validity</i>. However, <i>ecological validity</i> is reduced: real-world rowing involves variable conditions (headwinds, waves, course bends) that a tank cannot replicate. Always present at least one strength and one limitation in an \"evaluate\" question, and try to link each point to the context (blade design).<br><br>📖 <b>Course Companion — NOS section; SEHS Guide pp. 22–23 (Tool 1: Experimental Techniques)</b>"
                        }
                    },
                    {
                        label: "(d)(i)",
                        question: "Explain the body's acute responses to the stresses caused by a hot and humid environment.",
                        marks: 4,
                        answer: "✓ earlier sweat response/greater volume of sweat AND to maintain core body temperature at 37&lt;±1&gt;°C;<br>✓ sweat does not evaporate from body/cooling effect of evaporating sweat is lost AND body temperature increases faster;<br>✓ vasodilation of skin blood vessels occurs earlier AND to cool blood;<br>✓ working heart rates &lt;potentially&gt; higher AND to move blood to the skin earlier for cooling;",
                        studentExplanation: {
                            title: "Thermoregulation",
                            icon: "📚",
                            content: "The body uses <b>thermoregulation</b> to keep core temperature at ~37°C. In hot conditions, the hypothalamus triggers sweating and vasodilation. In <b>high humidity</b>, sweat cannot evaporate efficiently (the air is already saturated with moisture) — so the main cooling mechanism fails. As a result, the body temperature rises faster, heart rate climbs (cardiovascular drift), and vasodilation redirects blood to the skin, reducing delivery to working muscles. Note that in an \"explain\" question, you must always state the <i>mechanism AND the consequence</i> (linked with AND).<br><br>📖 <b>Course Companion — Chapter on Environment & Exercise (Thermoregulation section)</b>"
                        }
                    },
                    {
                        label: "(d)(ii)",
                        question: "Outline how athletes' physical responses may influence their use of self-talk.",
                        marks: 1,
                        answer: "✓ increased self-talk &lt;strategies&gt; to manage awareness of increased stress on body/doubt on coping;<br>✓ increased negative self-talk in response to awareness of increased stress on body/doubt on coping;",
                        studentExplanation: {
                            title: "Self-Talk & Stress",
                            icon: "📚",
                            content: "<b>Self-talk</b> is the internal monologue athletes use during training and competition. When the body is under physiological stress (elevated heart rate, fatigue, heat), athletes become more aware of their discomfort, which can trigger <i>negative self-talk</i> (\"I can't keep going\") or provoke the deliberate use of <i>positive/instructional self-talk</i> to manage the discomfort. Either direction is valid — the key is linking the physical response to a change in self-talk behaviour.<br><br>📖 <b>Course Companion — Chapter on Psychology of Sport (Self-talk section)</b>"
                        }
                    },
                    {
                        label: "(e)",
                        question: "A rower is in a boat with seven other rowers and a cox.<div class=\"fig-placeholder\"><i class=\"ph-bold ph-image\"></i>[Placeholder: Figure 5 - Rowing boat]</div>The cox at the stern steers the boat and instructs the rowers using a microphone. Using examples, describe two types of distractors which the rower needs to manage.",
                        marks: 2,
                        answer: "<b>External:</b> ✓ auditory: opposition/cox voices/crowd OR visual: crowd/light/sun/other crews;<br><b>Internal:</b> ✓ self-doubt/personal issues/thought distractions/concerns about preparation;",
                        studentExplanation: {
                            title: "Attentional Focus",
                            icon: "📚",
                            content: "<b>Attentional focus</b> is the ability to direct mental concentration to relevant cues. Distractors disrupt this. They fall into two categories:<br><br><b>External distractors</b> come from the environment — sounds (crowd noise, a cox's instructions from another boat) or sights (sun glare off the water, opposing boat's movement)<br><b>Internal distractors</b> come from within the athlete — self-doubt, worrying about a past mistake, or anxiety about fitness preparation.<br><br>In a race, rowers must use focus strategies (e.g., attentional cues, process goals) to filter these out.<br><br>📖 <b>Course Companion — Chapter on Psychology of Sport (Attentional Focus section)</b>"
                        }
                    },
                    {
                        label: "(f)(i)",
                        question: "Outline the change in ATP source during the rowing race.",
                        marks: 3,
                        answer: "✓ ATP produced throughout by aerobic respiration/oxidative system;<br>✓ limited supply of ATP/ATP-CP &lt;in muscle&gt; used at start &lt;of race&gt;;<br>✓ ATP produced by anaerobic respiration/phosphagen and anaerobic glycolysis;",
                        studentExplanation: {
                            title: "Energy Systems Continuum",
                            icon: "📚",
                            content: "The three energy systems operate along a <b>continuum</b>, not in isolation:<br><br><b>Phosphocreatine (ATP-CP/phosphagen) system</b> — provides immediate ATP for the explosive start (~0–10 seconds); very limited stores<br><b>Anaerobic glycolysis</b> — kicks in within seconds; produces ATP quickly without oxygen but generates lactate; dominant in early race stages<br><b>Aerobic oxidative system</b> — dominates throughout the 6-minute 50-second race, breaking down carbohydrates and fats with oxygen.<br><br>A 2000m rowing race is predominantly aerobic (~70–75%), but maximal efforts at the catch/drive phase repeatedly tap anaerobic sources.<br><br>📖 <b>Course Companion — Chapter on Energy Systems (ATP continuum)</b>"
                        }
                    },
                    {
                        label: "(f)(ii)",

                        marks: 3,

                            title: "VO₂max Adaptations",
                            icon: "📚",
                            content: "<b>VO₂max</b> is the maximum rate at which the body can consume oxygen and is the gold standard of aerobic fitness. Endurance training causes several adaptations that collectively raise VO₂max:<br><br><b>Cardiac adaptations:</b> increased stroke volume (more blood per beat) → higher cardiac output (Q = SV × HR)<br><b>Peripheral adaptations:</b> increased capillary density in muscles → better O₂ delivery and extraction<br><b>Haematological adaptations:</b> increased blood volume and haemoglobin → enhanced O₂ transport<br><br>Each adaptation improves the <b>Fick equation</b>: VO₂max = cardiac output × arteriovenous oxygen difference.<br><br>📖 <b>Course Companion — Chapter on Training & Physiology (VO₂max and Cardiac Adaptations)</b>"

                            content: "In hot/humid conditions, the cardiovascular system faces <b>competing demands</b>: it must deliver blood to working muscles (for exercise) AND to the skin (for cooling). This creates <b>cardiovascular strain</b>:<br><br>Via dehydration route: plasma volume falls → stroke volume decreases → heart rate rises to compensate (maintain cardiac output)<br>Via thermoregulation route: blood is shunted to the skin → muscles receive less O₂<br><br>Either way, athletes hit their <b>maximum heart rate at lower exercise intensities</b>, meaning aerobic capacity effectively decreases. Volleyball involves repeated sprints and jumps — the aerobic system can no longer support these demands adequately, so the body shifts to greater reliance on <b>anaerobic glycolysis</b>. This produces more lactate and leads to earlier fatigue.<br><br>📖 <b>Course Companion — Chapter on Environment & Exercise; Energy Systems</b>"
                        }
                    },
                    {
                        label: "(c)",
                        question: "Discuss the use of self-talk following a contested referee decision.",
                        marks: 3,
                        answer: "✓ alters emotional response &lt;to stressor&gt; OR positive and negative impact;<br>✓ &lt;deliberate&gt; recall past positive experiences OR use helpful phrases/acronyms;<br>✓ negative &lt;unintentional&gt; self-talk reduces attentional focus;",
                        studentExplanation: {
                            title: "Self-Talk After Setbacks",
                            icon: "📚",
                            content: "Self-talk after a referee decision operates in two directions:<br><br><b>Positive/instructional self-talk:</b> deliberately using helpful phrases (\"Stay focused\", \"Next point\") can re-direct attention, regulate arousal, and prevent rumination. Athletes may use cue words or acronyms developed in training.<br><b>Negative self-talk:</b> automatic, unintentional inner criticism (\"That's so unfair\", \"I'm losing it\") consumes cognitive resources, narrows attentional focus, and can cause performance deterioration (known as <b>choking</b>).<br><br>A \"discuss\" answer needs both positive and negative impacts to be fully credited.<br><br>📖 <b>Course Companion — Chapter on Psychology of Sport (Self-Talk)</b>"
                        }
                    },
                    {
                        label: "(d)",
                        question: "Outline two benefits of using a constraints-led approach when coaching the jump serve in volleyball.",
                        marks: 2,
                        answer: "✓ greater ability to adapt to situations/variability in game;<br>✓ &lt;assist in&gt; development of cognitive skills;<br>✓ increase motivation due to variability;",
                        studentExplanation: {
                            title: "Constraints-Led Approach",
                            icon: "📚",
                            content: "The <b>constraints-led approach (CLA)</b> is grounded in <b>ecological dynamics theory</b> and contrasts with traditional linear pedagogy. Rather than prescribing a fixed technique, the coach manipulates <b>task, environmental, and individual constraints</b> to guide the athlete toward functional solutions. For the jump serve, this might involve varying the target zone, adjusting the net height, or serving from different positions. Benefits include:<br><br><b>Adaptability:</b> athletes develop flexible movement solutions that transfer to game scenarios<br><b>Cognitive engagement:</b> athletes are required to problem-solve, enhancing decision-making skills<br><b>Motivation:</b> varied challenges maintain interest better than repetitive drills<br><br>📖 <b>Course Companion — Chapter on Skill Acquisition (Constraints-Led Approach & Ecological Dynamics)</b>"
                        }
                    },
                    {
                        label: "(e)",
                        question: "Outline how a coach might structure training sessions to take advantage of the social learning theory to improve performance.",
                        marks: 2,
                        answer: "✓ create positively reinforcing and collaborative opportunities &lt;in groups/sub-teams&gt;;<br>✓ learn behaviours/attitudes/behavioural consequences from each other;",
                        studentExplanation: {
                            title: "Social Learning Theory",
                            icon: "📚",
                            content: "<b>Social Learning Theory (Bandura)</b> proposes that learning occurs through <b>observation, imitation, and reinforcement</b> within a social environment. Key mechanisms are:<br><br><b>Modelling:</b> athletes watch skilled peers or role models and replicate their behaviour<br><b>Vicarious reinforcement:</b> observing a teammate being rewarded for a behaviour increases the observer's motivation to copy it<br><b>Self-efficacy:</b> seeing similar others succeed raises one's own belief in capability<br><br>A coach can leverage this by pairing less-skilled players with more-skilled players, using peer coaching, creating team norms around effort and technique, and publicly recognising positive behaviours — creating a <b>mastery motivational climate</b> within the squad.<br><br>📖 <b>Course Companion — Chapter on Skill Acquisition & Coaching (Social Learning Theory)</b>"
                        }
                    }
                ]
            }
        ];

        let currentQIndex = 0;
        let currentQ = p2Questions[0];
        let answered = {}; // partLabel -> { status, studentInput, resultHTML }
        let questionAttempts = {}; // partLabel -> count

        function renderExam() {
            const container = document.getElementById('examContainer');
            currentQ = p2Questions[currentQIndex];

            let partsHTML = currentQ.parts.map((p, idx) => {
                const partId = `part_${idx}`;
                const partKey = `${currentQ.id}_${p.label}`;
                const state = answered[partKey] || { status: 'unanswered', studentInput: '' };

                let feedbackHTML = '';
                if (state.status === 'revealed' || state.status === 'marked') {
                    feedbackHTML = state.resultHTML || '';
                    if (!feedbackHTML && state.status === 'revealed') {
                        let explanationHTML = '';
                        if (p.studentExplanation) {
                            const exp = typeof p.studentExplanation === 'string'
                                ? { title: 'Topic Review', content: p.studentExplanation, icon: '💡' }
                                : p.studentExplanation;

                            explanationHTML = `
                            <div class="explanation-block">
                                <div class="explanation-title">${exp.icon || '💡'} ${exp.title || 'Student Explanation'}</div>
                                <div class="explanation-body">${exp.content}</div>
                            </div>`;
                        }

                        feedbackHTML = `
                        <div class="feedback-block">
                            <div class="ans-header">Mark Scheme:</div>
                            <div class="actual-ans">${p.answer}</div>
                            ${explanationHTML}
                        </div>`;
                    }
                }

                return `
                <div class="part-container">
                    <div class="score-row">
                        <div class="part-label-wrapper" style="display: flex; align-items: flex-start; gap: 12px; flex: 1;">
                            <span class="part-label">${p.label}</span>
                            <div class="part-question">${p.question}</div>
                        </div>
                        <span class="marks-preview">[${p.marks} MARKS]</span>
                    </div>
                    <textarea id="${partId}" ${state.status !== 'unanswered' ? 'disabled' : ''} placeholder="Type your answer here...">${state.studentInput}</textarea>
                    
                    ${state.status === 'unanswered' ? `
                    <div class="btn-row">
                        <button class="submit-btn" id="submit_btn_${idx}" onclick="submitPart('${p.label}', ${idx})">Submit Answer</button>
                        <button class="reveal-btn" id="reveal_btn_${idx}" onclick="revealPart('${p.label}', ${idx})">Show Mark Scheme</button>
                    </div>
                    <div class="loading" id="loading_${idx}"><div class="spinner"></div>AI Marking...</div>` : ''}
                    
                    <div id="result_${idx}">${feedbackHTML}</div>
                </div>`;
            }).join('');

            container.innerHTML = `
                <div class="question-header">
                    <span class="subtopic-badge">${currentQ.subtopic} · ${currentQ.level}</span>
                    <span class="q-counter">Question ${currentQIndex + 1} / ${p2Questions.length}</span>
                </div>
                
                <div class="card">
                    <h2 class="question-title">${currentQ.title}</h2>
                    <div class="context-block">${currentQ.context}</div>
                    <div class="parts-container">
                        ${partsHTML}
                    </div>
                </div>
                
                <div class="question-nav">
                    <button class="nav-btn" id="prevBtn" onclick="navigateQuestion(-1)">← Previous</button>
                    <button class="random-btn" onclick="loadRandomQuestion()">🎲</button>
                    <button class="nav-btn" id="nextBtn" onclick="navigateQuestion(1)">Next →</button>
                </div>`;

            updateNavButtons();
        }

        async function submitPart(label, idx) {
            const partId = `part_${idx}`;
            const input = document.getElementById(partId).value.trim();
            if (!input) { alert('Please type an answer first.'); return; }

            const partKey = `${currentQ.id}_${label}`;
            if (!questionAttempts[partKey]) questionAttempts[partKey] = 0;
            questionAttempts[partKey]++;

            const loadingEl = document.getElementById(`loading_${idx}`);
            if (loadingEl) loadingEl.style.display = 'block';
            document.getElementById(`submit_btn_${idx}`).disabled = true;
            document.getElementById(`reveal_btn_${idx}`).disabled = true;

            const part = currentQ.parts[idx];

            try {
                const response = await fetch('https://sehsexam.thatjamiebloke.workers.dev/mark', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        questionId: partKey,
                        question: part.question,
                        markScheme: part.answer,
                        maxMarks: part.marks,
                        answer: input,
                        attemptNumber: questionAttempts[partKey]
                    }),
                });

                const data = await response.json();

                let resultHTML = '';
                if (data.error) {
                    resultHTML = `<p style="color: red; margin-top: 10px;">AI Marking Error: ${data.error}</p>`;
                } else {
                    const percentage = Math.round((data.score / part.marks) * 100);
                    
                    let explanationHTML = '';
                    if (part.studentExplanation) {
                        const exp = typeof part.studentExplanation === 'string'
                            ? { title: 'Topic Review', content: part.studentExplanation, icon: '💡' }
                            : part.studentExplanation;

                        explanationHTML = `
                        <div class="explanation-block" style="margin-top: 16px;">
                            <div class="explanation-title">${exp.icon || '💡'} ${exp.title || 'Student Explanation'}</div>
                            <div class="explanation-body">${exp.content}</div>
                        </div>`;
                    }
                    
                    resultHTML = `
                        <div class="result" style="display: block;">
                            <div class="score-display">
                                Score: ${data.score}/${part.marks} (${percentage}%)
                            </div>
                            <div class="comment-section" style="background: #e8f5e9; border-left: 4px solid #10b981;">
                                <h3>✅ Strengths</h3>
                                <p>${data.strengths}</p>
                            </div>
                            <div class="comment-section" style="background: #fff3e0; border-left: 4px solid #f59e0b;">
                                <h3>📝 Areas to Improve</h3>
                                <p>${data.improvements}</p>
                            </div>
                            <div class="hint-section" style="background: #e3f2fd; border-left: 4px solid #2196F3;">
                                <h3>💡 Study Tip</h3>
                                <p>${data.studyTip}</p>
                            </div>
                            
                            <div class="feedback-block">
                                <div class="ans-header">Mark Scheme:</div>
                                <div class="actual-ans">${part.answer}</div>
                            </div>
                            ${explanationHTML}
                        </div>
                    `;
                }

                answered[partKey] = { status: 'marked', studentInput: input, resultHTML: resultHTML };
                renderExam();
                updateProgress();

            } catch (error) {
                console.error("AI Marking Error:", error);
                alert("Failed to connect to AI marking service. Revealing mark scheme instead.");
                revealPart(label, idx, input);
            } finally {
                const loadingEl = document.getElementById(`loading_${idx}`);
                if (loadingEl) loadingEl.style.display = 'none';
            }
        }

        function revealPart(label, idx, input = '') {
            const partKey = `${currentQ.id}_${label}`;
            const studentInput = input || document.getElementById(`part_${idx}`).value;

            const p = currentQ.parts[idx];
            let explanationHTML = '';
            if (p.studentExplanation) {
                const exp = typeof p.studentExplanation === 'string'
                    ? { title: 'Topic Review', content: p.studentExplanation, icon: '💡' }
                    : p.studentExplanation;

                explanationHTML = `
                <div class="explanation-block">
                    <div class="explanation-title">${exp.icon || '💡'} ${exp.title || 'Student Explanation'}</div>
                    <div class="explanation-body">${exp.content}</div>
                </div>`;
            }

            const resultHTML = `
                <div class="feedback-block">
                    <div class="ans-header">Mark Scheme:</div>
                    <div class="actual-ans">${p.answer}</div>
                    ${explanationHTML}
                </div>`;

            answered[partKey] = { status: 'revealed', studentInput: studentInput, resultHTML: resultHTML };
            renderExam();
            updateProgress();
        }

        function navigateQuestion(direction) {
            currentQIndex += direction;
            if (currentQIndex < 0) currentQIndex = 0;
            if (currentQIndex >= p2Questions.length) currentQIndex = p2Questions.length - 1;
            renderExam();
        }

        function loadRandomQuestion() {
            currentQIndex = Math.floor(Math.random() * p2Questions.length);
            renderExam();
        }

        function updateNavButtons() {
            document.getElementById('prevBtn').disabled = currentQIndex === 0;
            document.getElementById('nextBtn').disabled = currentQIndex === p2Questions.length - 1;
        }

        function updateProgress() {
            let totalParts = 0;
            let answeredParts = 0;

            p2Questions.forEach(q => {
                q.parts.forEach(p => {
                    totalParts++;
                    if (answered[`${q.id}_${p.label}`]) {
                        answeredParts++;
                    }
                });
            });

            const pct = Math.round((answeredParts / totalParts) * 100);
            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('progressText').textContent = pct + '% Complete';
        }

        window.onload = renderExam;
    </script>
</body>
</html>
