<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper 1B – Nature of Science | IB SEHS Specimen</title>
    <link rel="icon" type="image/x-icon" href="../sehsexam/favicon.ico">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --primary: #0f172a;
            --primary-light: #1e293b;
            --accent: #10b981;
            --accent-soft: rgba(16, 185, 129, 0.1);
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #334155;
            --text-dark: #0f172a;
            --border: #e2e8f0;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--primary);
            background-image: radial-gradient(circle at 2px 2px, rgba(255, 255, 255, 0.05) 1px, transparent 0);
            background-size: 32px 32px;
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 80px;
            line-height: 1.5;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 35px;
            animation: fadeInDown 0.6s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header .back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 16px;
            transition: color 0.2s;
        }

        .header .back:hover {
            color: white;
        }

        .header h1 {
            font-size: 2.5em;
            font-weight: 800;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Context / Data Response Styles */
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border);
        }

        .subtopic-badge {
            background: var(--accent-soft);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .q-counter {
            font-size: 12px;
            font-weight: 600;
            color: #94a3b8;
        }

        .question-title {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 16px;
        }

        .context-block {
            background: #f8fafc;
            border-left: 4px solid var(--accent);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 24px;
            line-height: 1.6;
            color: #475569;
            font-size: 16px;
        }

        /* Table Styling */
        .table-container {
            margin: 24px 0;
            overflow-x: auto;
        }

        .table-title {
            font-weight: 700;
            font-size: 14px;
            color: var(--text-dark);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .data-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .data-table th,
        .data-table td {
            padding: 14px 18px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .data-table tr:last-child th,
        .data-table tr:last-child td {
            border-bottom: none;
        }

        .data-table th {
            background: #f1f5f9;
            font-weight: 700;
            color: var(--text-dark);
            width: 35%;
        }

        .data-table td {
            background: white;
            color: #475569;
        }

        /* Image Styling */
        .fig-box {
            background: #ffffff;
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 24px;
            text-align: center;
        }

        .fig-box img {
            max-width: 100%;
            border-radius: 8px;
        }

        .fig-label {
            display: block;
            margin-top: 10px;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-dark);
        }

        /* Part Styles */
        .part-container {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
        }

        .score-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            gap: 16px;
        }

        .part-label-wrapper {
            display: flex;
            gap: 10px;
        }

        .part-label {
            font-weight: 800;
            color: var(--accent);
            white-space: nowrap;
        }

        .part-question {
            font-size: 16px;
            font-weight: 600;
            line-height: 1.5;
            color: var(--text-dark);
        }

        .marks-preview {
            background: #f1f5f9;
            color: #64748b;
            padding: 4px 10px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        textarea {
            width: 100%;
            min-height: 110px;
            padding: 16px;
            background: #f8fafc;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 15px;
            font-family: inherit;
            margin-top: 8px;
            margin-bottom: 16px;
            transition: all 0.2s;
            resize: vertical;
        }

        textarea:focus {
            outline: none;
            background: white;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-soft);
        }

        textarea:disabled {
            background: #f1f5f9;
            cursor: not-allowed;
        }

        /* Feedback Block */
        .feedback-block {
            margin-top: 20px;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .ans-header {
            font-size: 12px;
            font-weight: 800;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .actual-ans {
            background: #fdf6e3;
            /* Soft cream for "marking scheme" feel */
            border-left: 4px solid #d4a017;
            padding: 16px;
            border-radius: 0 8px 8px 0;
            font-size: 15px;
            line-height: 1.7;
            color: #856404;
            margin-bottom: 16px;
        }

        .explanation-block {
            background: #f0fdf4;
            border: 1px solid #dcfce7;
            border-radius: 12px;
            padding: 16px;
        }

        .explanation-title {
            font-weight: 800;
            color: #166534;
            font-size: 14px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .explanation-body {
            font-size: 14px;
            color: #166534;
            line-height: 1.6;
        }

        /* Buttons */
        .btn-row {
            display: flex;
            gap: 12px;
        }

        .submit-btn {
            flex: 1;
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .submit-btn:hover:not(:disabled) {
            filter: brightness(1.1);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .reveal-btn {
            padding: 14px 20px;
            background: white;
            color: #64748b;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .reveal-btn:hover:not(:disabled) {
            background: #f8fafc;
            border-color: #cbd5e1;
            color: var(--text-dark);
        }

        .submit-btn:disabled,
        .reveal-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* Navigation */
        .question-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            margin-top: 32px;
        }

        .nav-btn {
            padding: 12px 24px;
            background: var(--primary-light);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn:hover:not(:disabled) {
            background: #334155;
            transform: translateY(-1px);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .random-btn {
            width: 48px;
            height: 48px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.2s;
        }

        .random-btn:hover {
            transform: rotate(15deg) scale(1.1);
        }

        /* Progress Bar */
        .progress-bar-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 0 40px;
        }

        .progress-wrapper {
            flex: 1;
            height: 10px;
            background: #f1f5f9;
            border-radius: 10px;
            margin-right: 20px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
        }

        .progress-text {
            font-weight: 800;
            font-size: 14px;
            color: var(--primary-light);
            min-width: 130px;
        }
    </style>
    <script src="saQuestions.js"></script>
</head>

<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back"><i class="ph-bold ph-arrow-left"></i> BACK TO DASHBOARD</a>
            <h1><i class="ph-fill ph-flask text-emerald-400"></i> Paper 1B – Nature of Science</h1>
        </div>

        <div id="examContainer" class="card"></div>
    </div>

    <!-- Progress Bar -->
    <div class="progress-bar-container">
        <div class="progress-wrapper">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-text" id="progressText">0% COMPLETE</div>
    </div>

    <script>
        let currentQIndex = 0;
        let currentQ = saQuestions[0];
        let answered = {}; // partLabel -> { status, studentInput, resultHTML }
        let questionAttempts = {}; // partLabel -> count

        function renderExam() {
            const container = document.getElementById('examContainer');
            currentQ = saQuestions[currentQIndex];

            // Render Table
            let tableHTML = '';
            if (currentQ.table) {
                let rowsHTML = currentQ.table.rows.map(r => `<tr><th>${r[0]}</th><td>${r[1]}</td></tr>`).join('');
                tableHTML = `
                <div class="table-container">
                    <p class="table-title">${currentQ.table.title}</p>
                    <table class="data-table">
                        <tbody>${rowsHTML}</tbody>
                    </table>
                </div>`;
            }

            // Render Parts
            let partsHTML = currentQ.parts.map((p, idx) => {
                const partId = `part_${idx}`;
                const partKey = `${currentQ.id}_${p.label}`;
                const state = answered[partKey] || { status: 'unanswered', studentInput: '' };

                let feedbackHTML = '';
                if (state.status === 'revealed' || state.status === 'marked') {
                    feedbackHTML = state.resultHTML || '';
                    if (!feedbackHTML && state.status === 'revealed') {
                        const explanationHTML = p.studentExplanation ? `
                        <div class="explanation-block">
                            <div class="explanation-title"><i class="ph-fill ph-lightbulb"></i> Student Explanation — ${p.studentExplanation.title}</div>
                            <div class="explanation-body">${p.studentExplanation.content}</div>
                        </div>` : '';

                        feedbackHTML = `
                        <div class="feedback-block">
                            <div class="ans-header">Mark Scheme:</div>
                            <div class="actual-ans">${p.answer}</div>
                            ${explanationHTML}
                        </div>`;
                    }
                }

                return `
                <div class="part-container">
                    <div class="score-row">
                        <div class="part-label-wrapper">
                            <span class="part-label">${p.label}</span>
                            <span class="part-question">${p.question}</span>
                        </div>
                        <span class="marks-preview">${p.marks} MARKS</span>
                    </div>
                    <textarea id="${partId}" ${state.status !== 'unanswered' ? 'disabled' : ''} placeholder="Ex: Direct correlation between time and shoe type...">${state.studentInput}</textarea>
                    
                    ${state.status === 'unanswered' ? `
                    <div class="btn-row">
                        <button class="submit-btn" id="submit_btn_${idx}" onclick="submitPart('${p.label}', ${idx})">
                            <i class="ph-bold ph-paper-plane-tilt"></i> SUBMIT TO AI
                        </button>
                        <button class="reveal-btn" id="reveal_btn_${idx}" onclick="revealPart('${p.label}', ${idx})">SHOW SCHEME</button>
                    </div>
                    <div class="loading" id="loading_${idx}"><div class="spinner"></div>Analysing Response...</div>` : ''}
                    
                    <div id="result_${idx}">${feedbackHTML}</div>
                </div>`;
            }).join('');

            // Render Image
            let imageHTML = '';
            if (currentQ.image || (currentQ.table && currentQ.table.image)) {
                const imgSrc = currentQ.image || currentQ.table.image;
                imageHTML = `
                <div class="fig-box">
                    <img src="${imgSrc}" alt="Question Figure">
                    <span class="fig-label">FIGURE 1: Experimental Data</span>
                </div>`;
            } else if (currentQ.images) {
                imageHTML = currentQ.images.map((img, i) => `
                <div class="fig-box">
                    <img src="${img}" alt="Question Figure">
                    <span class="fig-label">FIGURE ${i + 1}</span>
                </div>`).join('');
            }

            container.innerHTML = `
                <div class="question-header">
                    <span class="subtopic-badge">${currentQ.subtopic} · ${currentQ.level}</span>
                    <span class="q-counter">QUESTION ${currentQIndex + 1} / ${saQuestions.length}</span>
                </div>
                <h2 class="question-title">${currentQ.title}</h2>
                <div class="context-block">${currentQ.context}</div>
                ${tableHTML}
                ${imageHTML}
                <div class="parts-container">
                    ${partsHTML}
                </div>
                
                <div class="question-nav">
                    <button class="nav-btn" id="prevBtn" onclick="navigateQuestion(-1)"><i class="ph-bold ph-caret-left"></i> PREV</button>
                    <button class="random-btn" onclick="loadRandomQuestion()"><i class="ph-fill ph-shuffle"></i></button>
                    <button class="nav-btn" id="nextBtn" onclick="navigateQuestion(1)">NEXT <i class="ph-bold ph-caret-right"></i></button>
                </div>`;

            updateNavButtons();
        }

        async function submitPart(label, idx) {
            const partId = `part_${idx}`;
            const input = document.getElementById(partId).value.trim();
            if (!input) { alert('Please type an answer first.'); return; }

            const partKey = `${currentQ.id}_${label}`;
            if (!questionAttempts[partKey]) questionAttempts[partKey] = 0;
            questionAttempts[partKey]++;

            document.getElementById(`loading_${idx}`).style.display = 'block';
            document.getElementById(`submit_btn_${idx}`).disabled = true;
            document.getElementById(`reveal_btn_${idx}`).disabled = true;

            const part = currentQ.parts[idx];

            try {
                const response = await fetch('https://sehsexam.thatjamiebloke.workers.dev/mark', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        questionId: partKey,
                        question: part.question,
                        markScheme: part.answer,
                        maxMarks: part.marks,
                        answer: input,
                        attemptNumber: questionAttempts[partKey]
                    }),
                });

                const data = await response.json();

                let resultHTML = '';
                if (data.error) {
                    resultHTML = `<p style="color: red; margin-top: 10px;">AI Marking Error: ${data.error}</p>`;
                } else {
                    const percentage = Math.round((data.score / part.marks) * 100);
                    resultHTML = `
                        <div class="result" style="display: block;">
                            <div class="score-display">
                                Score: ${data.score}/${part.marks} (${percentage}%)
                            </div>
                            <div class="comment-section" style="background: #e8f5e9; border-left: 4px solid #10b981;">
                                <h3>✅ Strengths</h3>
                                <p>${data.strengths}</p>
                            </div>
                            <div class="comment-section" style="background: #fff3e0; border-left: 4px solid #f59e0b;">
                                <h3>📝 Areas to Improve</h3>
                                <p>${data.improvements}</p>
                            </div>
                            <div class="hint-section" style="background: #e3f2fd; border-left: 4px solid #2196F3;">
                                <h3>💡 Study Tip</h3>
                                <p>${data.studyTip}</p>
                            </div>
                        </div>
                    `;
                }

                answered[partKey] = { status: 'marked', studentInput: input, resultHTML: resultHTML };
                renderExam();
                updateProgress();

            } catch (error) {
                console.error("AI Marking Error:", error);
                alert("Failed to connect to AI marking service. Revealing mark scheme instead.");
                revealPart(label, idx, input);
            } finally {
                const loadingEl = document.getElementById(`loading_${idx}`);
                if (loadingEl) loadingEl.style.display = 'none';
            }
        }

        function revealPart(label, idx, input = '') {
            const partKey = `${currentQ.id}_${label}`;
            const studentInput = input || document.getElementById(`part_${idx}`).value;

            const p = currentQ.parts[idx];
            const explanationHTML = p.studentExplanation ? `
                <div class="explanation-block">
                    <div class="explanation-title">💡 Student Explanation — ${p.studentExplanation.title}</div>
                    <div class="explanation-body">${p.studentExplanation.content}</div>
                </div>` : '';

            const resultHTML = `
                <div class="feedback-block">
                    <div class="ans-header">Mark Scheme:</div>
                    <div class="actual-ans">${p.answer}</div>
                    ${explanationHTML}
                </div>`;

            answered[partKey] = { status: 'revealed', studentInput: studentInput, resultHTML: resultHTML };
            renderExam();
            updateProgress();
        }

        function navigateQuestion(direction) {
            currentQIndex += direction;
            if (currentQIndex < 0) currentQIndex = 0;
            if (currentQIndex >= saQuestions.length) currentQIndex = saQuestions.length - 1;
            renderExam();
        }

        function loadRandomQuestion() {
            currentQIndex = Math.floor(Math.random() * saQuestions.length);
            renderExam();
        }

        function updateNavButtons() {
            document.getElementById('prevBtn').disabled = currentQIndex === 0;
            document.getElementById('nextBtn').disabled = currentQIndex === saQuestions.length - 1;
        }

        function updateProgress() {
            let totalParts = 0;
            let answeredParts = 0;

            saQuestions.forEach(q => {
                q.parts.forEach(p => {
                    totalParts++;
                    if (answered[`${q.id}_${p.label}`]) {
                        answeredParts++;
                    }
                });
            });

            const pct = Math.round((answeredParts / totalParts) * 100);
            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('progressText').textContent = pct + '% Complete';
        }

        window.onload = renderExam;
    </script>
</body>

</html>
