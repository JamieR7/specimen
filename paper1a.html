</head>

    <script>
        const mcQuestions = [
            {
                id: "Q1", section: "Specimen", subtopic: "Paper 1A", level: "HL",
                question: "What is measured by a baroreceptor?",
                options: ["Blood pressure", "Heart rate", "pH of the blood", "Carbon dioxide levels of the blood"],
                answer: 0,
                explanation: "Baroreceptors are pressure-sensitive nerve cells located in the aorta and carotid arteries. They detect changes in arterial blood pressure and send signals to the cardiovascular centre in the brain to help regulate it via the autonomic nervous system. They should not be confused with chemoreceptors (which detect O₂, CO₂ and H⁺) or proprioceptors (which detect movement and position)."
            },
            {
                id: "Q2", section: "Specimen", subtopic: "Paper 1A", level: "HL",
                question: "How does epinephrine cause an increase in cardiac output?",
                options: ["It decreases the contraction force in the myocardium.", "It increases heart rate by increasing the vagus nerve stimulation.", "It increases the contraction force in the myocardium.", "It decreases venous return and increases the stimulation rate of the sinoatrial node."],
                answer: 2,
                explanation: "Epinephrine (adrenaline) is released from the adrenal medulla and acts on cardiac tissue to increase both heart rate and the force of contraction (positive inotropic effect), thereby increasing stroke volume and cardiac output. Option B is wrong because the vagus nerve is parasympathetic and would slow the heart. Epinephrine acts via the sympathetic pathway, not the vagus nerve."
            },
            {
                id: "Q3", section: "Specimen", subtopic: "Paper 1A", level: "HL",
                question: "During exercise, blood insulin levels decrease, but glucose uptake into muscle cells increases. How must other variables change to increase glucose uptake?",
                options: ["Glucose concentration gradient: decrease | Insulin sensitivity: decrease", "Glucose concentration gradient: increase | Insulin sensitivity: increase", "Glucose concentration gradient: decrease | Insulin sensitivity: increase", "Glucose concentration gradient: increase | Insulin sensitivity: decrease"],
                answer: 1,
                explanation: "During exercise, working muscles rapidly consume glucose, keeping intracellular glucose low. This increases the concentration gradient (high blood glucose → low muscle cell glucose), driving more glucose in. Simultaneously, exercise increases insulin sensitivity — muscle cell receptors become more responsive to insulin, so even lower insulin levels are sufficient to facilitate glucose transport. These two mechanisms together maintain glucose uptake despite falling insulin levels."
            },
            {
                id: "Q4", section: "Specimen", subtopic: "Paper 1A", level: "HL",
                question: "What assists expiration?",
                options: ["The elastic recoil of the diaphragm and intercostal muscles", "The constriction of the bronchioles", "The contraction of the diaphragm and intercostal muscles", "The contraction of the sternocleidomastoid muscle"],
                answer: 0,
                explanation: "At rest, expiration is a passive process driven by the elastic recoil of the lungs and the relaxation of the diaphragm and external intercostal muscles. As these structures recoil back, the thoracic volume decreases and air is pushed out. Active (forced) expiration uses the internal intercostals and abdominal muscles, but these are not listed. Option C is incorrect because contraction of the diaphragm and intercostals causes inspiration, not expiration."
            },
            {
                id: "Q5", section: "Specimen", subtopic: "Paper 1A", level: "HL",
                question: "Which cardiovascular adaptation to endurance training will help to increase cardiac output?",
                options: ["The decrease in size of the heart muscle", "The decrease in the stretch of the heart muscle", "The increase in size of the heart muscle", "The increase in blood pressure in the aorta"],
                answer: 2,
                explanation: "Endurance training causes cardiac hypertrophy — the heart muscle (especially the left ventricle) increases in size and strength. A larger, stronger ventricle can pump more blood per beat (greater stroke volume). Since cardiac output = stroke volume × heart rate, increasing stroke volume directly increases cardiac output. This is sometimes called 'athlete's heart.'"
            },
            {
                id: "Q6", section: "Specimen", subtopic: "Paper 1A", level: "HL",
                question: "What increases the risk of hyponatremia for an athlete running a marathon in hot and humid conditions?",
                options: ["Excessive intake of water", "Limited intake of water", "Effective intake of electrolyte drinks that provide sodium", "Limited intake of water and salted pretzels"],
                answer: 0,
                explanation: "Hyponatremia is a dangerously low blood sodium concentration. Drinking excessive plain water dilutes the sodium already in the bloodstream, lowering its concentration. In hot/humid conditions, athletes also lose sodium through sweat, compounding the problem. Paradoxically, drinking too much water (overhydration) is a greater risk than dehydration for this condition. Electrolyte drinks (C) and salty snacks (D) would actually protect against hyponatremia."
            },
            {
                id: "Q7", section: "Specimen", subtopic: "Paper 1A", level: "HL",
                question: "What causes a decline in VO₂ max with increased age?",
                options: ["Enhanced glucose tolerance and insulin sensitivity", "Decrease in maximum heart rate", "Increase in fat-free mass percentage", "Increase in stroke volume of the heart"],
                answer: 1,
                explanation: "VO₂ max declines with age primarily because maximum heart rate decreases (estimated as 220 − age). Since maximal cardiac output depends on maximum heart rate × stroke volume, a lower maximum heart rate directly limits the upper ceiling of oxygen delivery. Options A, C and D all describe positive physiological characteristics that would not explain a decline in aerobic capacity."
            },
            {
                id: "Q8", section: "Specimen", subtopic: "Paper 1A", level: "HL",
                question: "What describes an elite marathon runner's optimal race pace?",
                options: ["The pace at maximum heart rate", "The pace where most of the energy is supplied by the oxidation of fatty acids", "The pace at which lactate is produced at the same rate as it is used", "The pace that can be sustained for the longest period of time"],
                answer: 2,
                explanation: "This describes the lactate threshold (also called maximal lactate steady state). At this pace, the rate of lactate production equals the rate of lactate clearance/utilisation, so blood lactate does not accumulate. Elite marathon runners race just at or slightly below this threshold to maximise pace without entering a state of rapidly rising lactate that would force them to slow down."
            },
            {
                id: "Q9", section: "Specimen", subtopic: "Paper 1A", level: "HL",
                question: "Which activity is most likely to use energy derived from fat reserves?",
                options: ["A basketball game (about 2 hours)", "A 2000 m rowing race (about 7–8 minutes)", "A 400 m sprint (about 1 minute)", "An Ironman Triathlon (about 11–12 hours)"],
                answer: 3,
                explanation: "Fat oxidation becomes the dominant fuel source during prolonged, low-to-moderate intensity exercise. An Ironman Triathlon lasts 11–12 hours, making it by far the most fat-dependent of the options. Short, intense activities (400 m sprint, rowing race) rely on the phosphagen system and anaerobic glycolysis. The basketball game uses mixed sources but at higher intensities than triathlon pacing."
            },
            {
                id: "Q10", section: "Specimen", subtopic: "Paper 1A", level: "HL",
                question: "Which training set is likely to increase the energy available in the short term from the phosphagen system?",
                options: ["Maximal intensity intervals lasting between 5 and 10 seconds with 60 seconds rest", "High-intensity intervals lasting between 30 and 60 seconds with 10-second rest intervals", "A long, continuous bout of exercise lasting at least 25 minutes", "A set of 10–12 repetitions of resistance exercise at 60–70% of 1 maximum repetition"],
                answer: 0,
                explanation: "The phosphagen system (ATP-PCr) provides energy for maximal efforts lasting up to ~10 seconds. To train this system, bouts must be very short and maximal, with long rest periods (e.g. 1:6 work-to-rest ratio) to allow full PCr resynthesis between sets. Option B has insufficient rest (too little recovery for PCr to replenish). Options C and D train aerobic and glycolytic systems respectively."
            },
            {
                id: "Q11", section: "Specimen", subtopic: "Paper 1A", level: "HL",
                question: "An athlete begins to show signs of overtraining. How can the training programme be altered to maintain an effective training adaptation?",
                options: ["Increase the frequency and maintain the intensity of each workout", "Increase the volume of training load by 15% each week", "Increase the frequency but drop the intensity below baseline measured values", "Decrease the rest and recovery phases"],
                answer: 2,
                explanation: "When an athlete shows overtraining symptoms (fatigue, declining performance, mood disturbance), the key is to reduce the training stimulus while still maintaining some activity. Dropping intensity well below baseline keeps the body moving (preventing complete detraining) while allowing recovery and rebuilding of physiological systems. Increasing volume (B) or reducing rest (D) would worsen overtraining syndrome."
            },
            {
                id: "Q12", section: "Specimen", subtopic: "Paper 1A", level: "HL",
                question: "Which exercise routine improves an adult's bone density? I. 30 minutes brisk walking, II. 30 minutes swimming, III. Resistance training",
                options: ["I and II only", "I and III only", "II and III only", "I, II and III"],
                answer: 1,
                explanation: "Bone density improves through weight-bearing and mechanical loading exercises. Brisk walking (I) is weight-bearing and applies ground reaction forces through bones. Resistance training (III) creates muscular tension that stresses bone, stimulating osteoblast activity. Swimming (II) is non-weight-bearing — the water supports the body — so it provides little mechanical loading to bones, making it ineffective for improving bone density."
            },
            {
                id: "Q13", section: "Specimen", subtopic: "Paper 1A", level: "HL",
                question: "An athlete who lives at sea level moves to train in a high-altitude climate, resulting in a decreased plasma volume. How does decreased plasma volume alter the normal physiological function of the heart to compensate for the decrease in blood oxygen levels?",
                options: ["Heart rate: decreases | Cardiac output: decreases", "Heart rate: increases | Cardiac output: increases", "Heart rate: decreases | Cardiac output: increases", "Heart rate: increases | Cardiac output: constant"],
                answer: 3,
                explanation: "A decrease in plasma volume reduces venous return, which lowers stroke volume (Frank-Starling mechanism). To compensate and maintain cardiac output at a similar level, the heart rate increases. Therefore, cardiac output remains approximately constant despite reduced stroke volume. Note that at altitude, the blood is also less oxygenated, intensifying this compensatory response."
            },
            {
                id: "Q14", section: "Specimen", subtopic: "Paper 1A", level: "HL",
                question: "What is a valid consideration for exercise prescription in older athletes (over 65)?",
                options: ["Resistance training should be avoided", "Balance training is of little benefit for older athletes", "Training should be limited to 15 minutes a week", "Aerobic exercises should focus on low-impact exercises"],
                answer: 3,
                explanation: "Older adults often experience reduced bone density, joint degeneration (e.g. osteoarthritis) and lower connective tissue resilience. Low-impact aerobic activities (cycling, swimming, walking) provide cardiovascular benefits while minimising joint stress and fracture risk. Resistance training (A) is actually recommended for older adults to preserve muscle mass and bone density. Balance training (B) is highly beneficial to prevent falls. Current guidelines recommend much more than 15 minutes per week (C)."
            },
            {
                id: "Q15", section: "Specimen", subtopic: "Paper 1A", level: "HL",
                question: "What describes the position of the patella relative to the metatarsals with reference to the hip joint?",
                options: ["Posterior", "Inferior", "Proximal", "Distal"],
                answer: 2,
                explanation: "Proximal means closer to the point of reference (here, the hip joint), and distal means further away. The patella (kneecap) is closer to the hip than the metatarsals (foot bones), so the patella is proximal to the metatarsals with reference to the hip joint. Students often confuse proximal/distal with superior/inferior — remember that proximal/distal are always relative to a stated reference point."
            },
            {
                id: "Q16", section: "Specimen", subtopic: "Paper 1A", level: "HL",
                question: "What is an example of circumduction?",
                options: ["Shoulder joint topspin in tennis", "Shoulder joint overarm serve in tennis", "Pointing toes in ballet", "Turning head to breathe when swimming"],
                answer: 1,
                explanation: "Circumduction is a circular movement combining flexion, extension, abduction and adduction sequentially, creating a cone-shaped motion. The overarm serve involves the arm moving in a large circular arc at the shoulder joint — a classic example. Topspin (A) involves wrist rotation (not the full shoulder circumduction). Pointing toes (C) is plantarflexion. Head turning (D) is rotation."
            },
            {
                id: "Q17", section: "Specimen", subtopic: "Paper 1A", level: "HL",
                question: "Which factors contribute to the total force produced at a motor unit? I. The number of muscle fibres, II. The muscle fibre type (type I or type II), III. The size of the motor unit",
                options: ["I and II only", "I and III only", "II and III only", "I, II and III"],
                answer: 3,
                explanation: "All three factors affect force output. A motor unit with more fibres (I) contracts more tissue simultaneously. Type II fibres (II) generate greater force than type I fibres due to higher myosin ATPase activity and faster cross-bridge cycling. The size of the motor unit (III) is actually directly related to the number of fibres it innervates — larger motor units innervate more fibres and generate more force. Recruitment of higher-threshold motor units produces progressively greater force."
            },
            {
                id: "Q18", section: "Specimen", subtopic: "Paper 1A", level: "HL",
                question: "What is the effect of reduced calcium during muscular contraction?",
                options: ["Increased availability of ATP causes an increase in ATP detaching from the myosin", "Reduced availability of ATP causes an increase in ATP detaching from the myosin", "Reduction in number of exposed actin and myosin binding sites causes a decrease in cross-bridge cycling", "Increase in number of exposed actin and myosin binding sites causes an increase in cross-bridge cycling"],
                answer: 2,
                explanation: "Calcium (Ca²⁺) is essential for muscle contraction. It binds to troponin, causing a conformational change in tropomyosin that exposes the active binding sites on actin. Without sufficient calcium, tropomyosin remains blocking these sites, fewer actin-myosin cross-bridges form, and muscle force decreases. This is the direct molecular link between calcium availability and muscle contraction force."
            },
            {
                id: "Q19", section: "Specimen", subtopic: "Paper 1A", level: "HL",
                question: "What describes a second-class lever?",
                options: ["Plantarflexion of the foot while jumping", "A bicep curl exercise", "Throwing a baseball", "Abduction of the shoulder joint"],
                answer: 0,
                explanation: "In a second-class lever, the load sits between the fulcrum and the effort. During plantarflexion (raising up on tiptoes/jumping), the fulcrum is the toe (ball of foot), the load is body weight (through the ankle/tibia), and the effort is the calf muscles pulling upward on the heel. This arrangement favours force production over speed/range of motion. A bicep curl (B) is a third-class lever."
            },
            {
                id: "Q20", section: "Specimen", subtopic: "Paper 1A", level: "HL",
                question: "How will a surfer increase their stability to maintain balance on a surfboard?",

        let userAnswers = {}; // qId -> chosenIndex
        let isReviewMode = false;
        let hasSubmitted = false;
        const letters = ['A', 'B', 'C', 'D'];

        function renderAllQuestions() {
            const container = document.getElementById('questionsContainer');
            const questions = mcQuestions;

            container.innerHTML = questions.map((q, idx) => {
                const selectedIdx = userAnswers[q.id];
                
                let statusEmoji = '';
                if (hasSubmitted && selectedIdx !== undefined) {
                    statusEmoji = (selectedIdx === q.answer) 
                        ? '<span style="font-size: 24px; margin-left: 12px; line-height: 1;">✅</span>' 
                        : '<span style="font-size: 24px; margin-left: 12px; line-height: 1;">❌</span>';
                }

                let optionsHTML = q.options.map((opt, i) => {
                    let cls = (selectedIdx === i) ? 'selected' : '';
                    if (isReviewMode) {
                        if (selectedIdx !== undefined) {
                            if (i === q.answer) cls += ' correct';
                            else if (selectedIdx === i) cls += ' wrong';
                        }
                        cls += ' disabled';
                    } else if (hasSubmitted) {
                        cls += ' disabled';
                    }
                    return `
                        <button class="option-btn ${cls}" onclick="selectOption('${q.id}', ${i})" ${(isReviewMode || hasSubmitted) ? 'disabled' : ''}>
                            <span class="option-letter">${letters[i]}</span>
                            <span>${opt.replace(/^[A-D]\.\s*/, '')}</span>
                        </button>
                    `;
                }).join('');

                let explanationHTML = '';
                if (isReviewMode && selectedIdx !== undefined) {
                    const content = q.explanation;
                    explanationHTML = `
                        <div class="explanation-block">
                            <div class="explanation-title">💡 Analysis</div>
                            <div class="explanation-body">${content}</div>
                        </div>
                    `;
                }

                return `
                    <div class="question-block" id="q_${q.id}">
                        <div class="question-header">
                            <div style="display: flex; align-items: center;">
                                <span class="subtopic-badge">${q.subtopic} · ${q.level}</span>
                                ${statusEmoji}
                            </div>
                            <span class="q-counter">Q${idx + 1}</span>
                        </div>
                        <p class="question-text">${q.question}</p>
                        <div class="options">${optionsHTML}</div>
                        ${explanationHTML}
                    </div>
                `;
            }).join('');
            
            updateProgressBar();
        }

        function selectOption(qId, index) {
            if (isReviewMode) return;
            userAnswers[qId] = index;
            renderAllQuestions();
        }

        function updateProgressBar() {
            const total = mcQuestions.length;
            const attempted = Object.keys(userAnswers).length;
            const pct = Math.round((attempted / total) * 100);
            
            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('progressText').textContent = `${attempted} / ${total} Attempted`;
        }

        function howDidIDo() {
            hasSubmitted = true;
            const total = mcQuestions.length;
            let correct = 0;
            
            mcQuestions.forEach(q => {
                if (userAnswers[q.id] === q.answer) correct++;
            });

            const scorePct = Math.round((correct / total) * 100);
            
            document.getElementById('submitAllBtn').style.display = 'none';
            document.getElementById('scoreSummary').style.display = 'block';
            document.getElementById('finalScoreLabel').textContent = `Score: ${correct} / ${total} (${scorePct}%)`;

            renderAllQuestions();

            if (scorePct === 100) {
                showCelebration(correct, total);
            } else {
                document.getElementById('reviewBtn').style.display = 'inline-block';
            }
        }

        function showCelebration(correct, total) {
            const overlay = document.getElementById('celebrationOverlay');
            overlay.querySelector('.score-display-big').textContent = `${correct} / ${total} · 100% CORRECT`;
            overlay.style.display = 'flex';
            
            // Start fireworks
            const duration = 60 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 3001 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                const particleCount = 50 * (timeLeft / duration);
                
                confetti(Object.assign({}, defaults, { 
                    particleCount, 
                    origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } 
                }));
                confetti(Object.assign({}, defaults, { 
                    particleCount, 
                    origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } 
                }));
            }, 500); // Slower interval for better performance over a minute
            
            overlay.dataset.intervalId = interval;
        }

        function hideCelebration() {
            const overlay = document.getElementById('celebrationOverlay');
            overlay.style.display = 'none';
            if (overlay.dataset.intervalId) {
                clearInterval(parseInt(overlay.dataset.intervalId));
            }
            reviewResults();
        }

        function reviewResults() {
            isReviewMode = true;
            document.getElementById('scoreSummary').style.display = 'none';
            renderAllQuestions();
            // Scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.onload = renderAllQuestions;
    </script>
