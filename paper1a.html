<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paper 1A – Multiple Choice | IB SEHS Specimen</title>
    <link rel="icon" type="image/x-icon" href="../sehsexam/favicon.ico">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #1e1b4b;
            --primary-light: #312e81;
            --accent: #f59e0b;
            --accent-soft: rgba(245, 158, 11, 0.1);
            --bg: #f5f3ff;
            --card-bg: #ffffff;
            --text-main: #1e1b4b;
            --text-dark: #000000;
            --border: #e0e7ff;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--primary);
            background-image: radial-gradient(circle at 2px 2px, rgba(255, 255, 255, 0.05) 1px, transparent 0);
            background-size: 32px 32px;
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 120px;
            line-height: 1.5;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 35px;
            animation: fadeInDown 0.6s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header .back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 16px;
            transition: color 0.2s;
        }

        .header .back:hover {
            color: white;
        }

        .header h1 {
            font-size: 2.5em;
            font-weight: 800;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .question-block {
            background: white;
            padding: 32px;
            border-radius: 24px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
            position: relative;
            transition: transform 0.2s;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .subtopic-badge {
            background: #eef2ff;
            color: #4338ca;
            padding: 6px 14px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 700;
        }

        .q-counter {
            background: var(--accent);
            color: white;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 800;
        }

        .question-text {
            font-size: 18px;
            line-height: 1.6;
            color: var(--text-dark);
            margin-bottom: 24px;
            font-weight: 600;
        }

        .fig-box {
            background: #f8fafc;
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 24px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .fig-box img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            border: 2px solid var(--border);
            border-radius: 16px;
            background: #f8fafc;
            cursor: pointer;
            font-size: 15px;
            text-align: left;
            transition: all 0.2s;
            font-family: inherit;
            font-weight: 500;
            color: var(--text-main);
            width: 100%;
        }

        .option-btn:hover:not(.disabled) {
            border-color: var(--accent);
            background: white;
            transform: translateX(4px);
        }

        .option-btn.selected {
            border-color: var(--accent);
            background: var(--accent-soft);
            box-shadow: 0 0 0 4px var(--accent-soft);
        }

        .option-btn.correct {
            border-color: #10b981 !important;
            background: #f0fdf4 !important;
            color: #166534 !important;
        }

        .option-btn.wrong {
            border-color: #ef4444 !important;
            background: #fef2f2 !important;
            color: #991b1b !important;
        }

        .option-letter {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid #cbd5e1;
            font-weight: 800;
            font-size: 14px;
            flex-shrink: 0;
            background: white;
        }

        .selected .option-letter {
            border-color: var(--accent);
            background: var(--accent);
            color: white;
        }

        .correct .option-letter {
            border-color: #10b981;
            background: #10b981;
            color: white;
        }

        .wrong .option-letter {
            border-color: #ef4444;
            background: #ef4444;
            color: white;
        }

        .explanation-block {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 2px solid var(--border);
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .explanation-title {
            font-weight: 800;
            color: #475569;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .explanation-body {
            font-size: 15px;
            line-height: 1.6;
            color: #475569;
            background: #f8fafc;
            padding: 16px;
            border-radius: 12px;
            border-left: 4px solid var(--accent);
        }

        /* Result Actions */
        .actions-container {
            text-align: center;
            margin: 60px 0;
            padding-bottom: 40px;
        }

        .submit-all-btn {
            padding: 20px 48px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 20px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(245, 158, 11, 0.4);
        }

        .submit-all-btn:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 15px 35px rgba(245, 158, 11, 0.5);
        }

        .review-btn {
            background: #334155;
            color: white;
            padding: 18px 36px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            border: none;
            display: none;
            transition: all 0.2s;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.2);
        }

        .review-btn:hover {
            background: #1e293b;
            transform: translateY(-2px);
        }

        /* Celebration Overlay */
        #celebrationOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(30, 27, 75, 0.98);
            z-index: 3000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            padding: 40px;
        }

        .legend-text {
            font-size: 5em;
            font-weight: 900;
            margin-bottom: 20px;
            background: linear-gradient(to right, #fbbf24, #f59e0b, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 2s infinite;
            text-shadow: 0 0 30px rgba(245, 158, 11, 0.5);
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }

        .score-display-big {
            font-size: 3em;
            font-weight: 900;
            color: #10b981;
            margin-bottom: 40px;
        }

        .close-overlay-btn {
            background: white;
            color: var(--primary);
            padding: 16px 32px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            border: none;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.2s;
        }

        .close-overlay-btn:hover {
            transform: scale(1.1);
        }

        /* Progress Bar */
        .progress-bar-container {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--border);
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 0 40px;
            gap: 20px;
        }

        .progress-wrapper {
            flex: 1;
            height: 12px;
            background: #f1f5f9;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.5s ease;
        }

        .progress-text {
            font-weight: 800;
            font-size: 15px;
            color: var(--primary);
            min-width: 180px;
        }
    </style>
    <script src="mcQuestions.js"></script>
</head>

<body>
    <div id="celebrationOverlay">
        <div class="legend-text">🌟 SEHS LEGEND 🌟</div>
        <div class="score-display-big">30 / 30 · 100% CORRECT</div>
        <p style="font-size: 1.8em; max-width: 700px; margin-bottom: 40px; font-weight: 700;">Bravo - you are a
            certified SEHS legend!!!!</p>
        <button class="close-overlay-btn" onclick="hideCelebration()">BACK TO EXAM RESULTS</button>
    </div>

    <div class="container">
        <div class="header">
            <a href="index.html" class="back"><i class="ph-bold ph-arrow-left"></i> BACK TO DASHBOARD</a>
            <h1><i class="ph-fill ph-circle-dashed text-amber-400"></i> Paper 1A – Multiple Choice</h1>
        </div>

        <div id="questionsContainer"></div>

        <div class="actions-container">
            <button class="submit-all-btn" id="submitAllBtn" onclick="howDidIDo()">HOW DID I DO?</button>
            <div id="scoreSummary" style="display:none; margin-top: 30px;">
                <h2 style="color: white; font-size: 2.5em; margin-bottom: 20px;" id="finalScoreLabel"></h2>
                <button class="review-btn" id="reviewBtn" onclick="reviewResults()">Would you like to see where you went
                    right and wrong?</button>
            </div>
        </div>
    </div>

    <div class="progress-bar-container">
        <div class="progress-wrapper">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-text" id="progressText">0 / 30 Attempted</div>
    </div>

    <script>
        let userAnswers = {}; // qId -> chosenIndex
        let isReviewMode = false;
        const letters = ['A', 'B', 'C', 'D'];

        function renderAllQuestions() {
            const container = document.getElementById('questionsContainer');
            const questions = window.mcQuestions;

            container.innerHTML = questions.map((q, idx) => {
                const selectedIdx = userAnswers[q.id];
                
                let imageHTML = q.image ? `
                    <div class="fig-box">
                        <img src="${q.image}" alt="Question Figure">
                    </div>` : '';

                let optionsHTML = q.options.map((opt, i) => {
                    let cls = (selectedIdx === i) ? 'selected' : '';
                    if (isReviewMode) {
                        if (i === q.answer) cls += ' correct';
                        else if (selectedIdx === i) cls += ' wrong';
                        cls += ' disabled';
                    }
                    return `
                        <button class="option-btn ${cls}" onclick="selectOption('${q.id}', ${i})" ${isReviewMode ? 'disabled' : ''}>
                            <span class="option-letter">${letters[i]}</span>
                            <span>${opt.replace(/^[A-D]\.\s*/, '')}</span>
                        </button>
                    `;
                }).join('');

                let explanationHTML = '';
                if (isReviewMode && selectedIdx !== undefined) {
                    const exp = typeof q.explanation === 'string' 
                        ? { content: q.explanation, title: 'Analysis', icon: '💡' } 
                        : q.explanation;
                    
                    explanationHTML = `
                        <div class="explanation-block">
                            <div class="explanation-title">${exp.icon || '💡'} ${exp.title || 'Analysis'}</div>
                            <div class="explanation-body">${exp.content}</div>
                        </div>
                    `;
                }

                return `
                    <div class="question-block" id="q_${q.id}">
                        <div class="question-header">
                            <span class="subtopic-badge">${q.subtopic} · ${q.level}</span>
                            <span class="q-counter">Q${idx + 1}</span>
                        </div>
                        <p class="question-text">${q.question}</p>
                        ${imageHTML}
                        <div class="options">${optionsHTML}</div>
                        ${explanationHTML}
                    </div>
                `;
            }).join('');
            
            updateProgressBar();
        }

        function selectOption(qId, index) {
            if (isReviewMode) return;
            userAnswers[qId] = index;
            renderAllQuestions();
        }

        function updateProgressBar() {
            const total = window.mcQuestions.length;
            const attempted = Object.keys(userAnswers).length;
            const pct = Math.round((attempted / total) * 100);
            
            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('progressText').textContent = `${attempted} / ${total} Attempted`;
        }

        function howDidIDo() {
            const total = window.mcQuestions.length;
            let correct = 0;
            
            window.mcQuestions.forEach(q => {
                if (userAnswers[q.id] === q.answer) correct++;
            });

            const scorePct = Math.round((correct / total) * 100);
            
            document.getElementById('submitAllBtn').style.display = 'none';
            document.getElementById('scoreSummary').style.display = 'block';
            document.getElementById('finalScoreLabel').textContent = `Score: ${correct} / ${total} (${scorePct}%)`;

            if (scorePct === 100) {
                showCelebration(correct, total);
            } else {
                document.getElementById('reviewBtn').style.display = 'inline-block';
            }
        }

        function showCelebration(correct, total) {
            const overlay = document.getElementById('celebrationOverlay');
            overlay.querySelector('.score-display-big').textContent = `${correct} / ${total} · 100% CORRECT`;
            overlay.style.display = 'flex';
            
            // Start fireworks
            const duration = 60 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 3001 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                const particleCount = 50 * (timeLeft / duration);
                
                confetti(Object.assign({}, defaults, { 
                    particleCount, 
                    origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } 
                }));
                confetti(Object.assign({}, defaults, { 
                    particleCount, 
                    origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } 
                }));
            }, 500); // Slower interval for better performance over a minute
            
            overlay.dataset.intervalId = interval;
        }

        function hideCelebration() {
            const overlay = document.getElementById('celebrationOverlay');
            overlay.style.display = 'none';
            if (overlay.dataset.intervalId) {
                clearInterval(parseInt(overlay.dataset.intervalId));
            }
            reviewResults();
        }

        function reviewResults() {
            isReviewMode = true;
            document.getElementById('scoreSummary').style.display = 'none';
            renderAllQuestions();
            // Scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.onload = renderAllQuestions;
    </script>
</body>

</html>
